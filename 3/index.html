<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task 3</title>
    <script type="module" src="https://unpkg.com/@le-pepe/snow-effect"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="alertify/alertify.core.css">
    <link rel="stylesheet" href="alertify/alertify.default.css">
    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>
    <script src="alertify/alertify.min.js"></script>
    <script src="https://raw.githack.com/aterrien/jQuery-Knob/master/dist/jquery.knob.min.js"></script>
    <script src="main.js" defer></script>
</head>
<body>
    <div class="wrapper">
        <div class="content">
            <h1><u>Online-Quest</u></h1>
            <h2>Task 3. Memory game</h2>
            <article>
                <p class="slideRules liquid-glass-btn">Description</p>
                <ul id="rules">
                    <li>Lorem ipsum dolor sit amet.</li>
                    <li>Lorem ipsum dolor, sit amet consectetur adipisicing elit.</li>
                    <li>Lorem, ipsum dolor.</li>
                </ul>
            </article>
            <div id="start" class="liquid-glass-rounded-btn">
                <img width="25px" height="25px" src="play.svg" alt="">
            </div>
            <div class="flex">
                <div class="taskProgress">
                    <p>Task progress:</p>
                    <input type="text" value="0" class="progress">
                </div>
                <div class="timeProgress">
                    <p>Time:</p>
                    <input type="text" value="0" class="time">
                </div>
            </div>
            <div class="gameBoard">

            </div>
            <div class="answer">
                <input type="text" id="inputTask1" name="answer">
                <input type="button" value="Go!" id="btnTask1" class="liquid-glass-rounded-btn">
            </div>
            <a href="#">
                <div id="nextTask" class="liquid-glass-rounded-btn">
                    <img width="25px" height="25px" src="next.svg" alt="">
                </div>
            </a>
        </div>
    </div>
    <svg class="absolute" aria-hidden="true">
        <filter id="distortion" x="0%" y="0%" width="100%" height="100%">
            <feTurbulence type="fractalNoise" baseFrequency="0.008 0.008" numOctaves="2" seed="92" result="noise">
            </feTurbulence>
            <feGaussianBlur in="noise" stdDeviation="2" result="blurred"></feGaussianBlur>
            <feDisplacementMap in="SourceGraphic" in2="blurred" scale="70" xChannelSelector="R" yChannelSelector="G">
            </feDisplacementMap>
        </filter>
    </svg>
    <snow-effect color="white" flakes="100" speed="1"></snow-effect>
</body>
</html>
